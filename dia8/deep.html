<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Database</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-section { padding: 20px 0; }
        .movie-card, .professional-card { margin-bottom: 20px; }
        .movie-poster, .professional-photo { 
            max-width: 100%; 
            height: auto;
            border-radius: 5px;
        }
        .section { display: none; }
        .section.active { display: block; }
        #addMovieForm { background: #f8f9fa; padding: 20px; border-radius: 5px; }
    </style>
</head>
<body>
    <!-- Portada -->
    <header class="bg-dark text-white text-center py-5 mb-4">
        <div class="container">
            <h1 class="display-4">Cine Database</h1>
            <p class="lead">Explora nuestro catálogo de películas y profesionales del cine</p>
        </div>
    </header>

    <!-- Navegación -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" data-section="home">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-section="movies">Películas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-section="professionals">Profesionales</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Secciones -->
    <div class="container">
        <!-- Sección Inicio -->
        <section id="home" class="section active">
            <div class="row">
                <div class="col-md-8 mx-auto text-center">
                    <h2>Bienvenido a Cine Database</h2>
                    <p class="lead">Selecciona una sección en el menú de navegación para explorar nuestro contenido.</p>
                    <img src="https://via.placeholder.com/800x400?text=Cine+Database" alt="Portada" class="img-fluid rounded mt-4">
                </div>
            </div>
        </section>

        <!-- Sección Películas -->
        <section id="movies" class="section">
            <h2 class="mb-4">Películas</h2>
            <div id="movies-container" class="row">
                <!-- Las películas se cargarán aquí dinámicamente -->
            </div>

            <!-- Formulario para añadir películas -->
            <div id="addMovieForm" class="mt-5">
                <h3>Añadir Nueva Película</h3>
                <form id="movieForm" class="row g-3">
                    <div class="col-md-6">
                        <label for="title" class="form-label">Título</label>
                        <input type="text" class="form-control" id="title" required>
                    </div>
                    <div class="col-md-6">
                        <label for="releaseYear" class="form-label">Año de lanzamiento</label>
                        <input type="number" class="form-control" id="releaseYear" required>
                    </div>
                    <div class="col-md-6">
                        <label for="nationality" class="form-label">Nacionalidad</label>
                        <input type="text" class="form-control" id="nationality" required>
                    </div>
                    <div class="col-md-6">
                        <label for="language" class="form-label">Idioma</label>
                        <input type="text" class="form-control" id="language" required>
                    </div>
                    <div class="col-md-6">
                        <label for="platform" class="form-label">Plataforma</label>
                        <input type="text" class="form-control" id="platform" required>
                    </div>
                    <div class="col-md-6">
                        <label for="isMCU" class="form-label">¿Es del MCU?</label>
                        <select class="form-select" id="isMCU" required>
                            <option value="true">Sí</option>
                            <option value="false" selected>No</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="mainCharacterName" class="form-label">Personaje principal</label>
                        <input type="text" class="form-control" id="mainCharacterName" required>
                    </div>
                    <div class="col-md-6">
                        <label for="producer" class="form-label">Productor</label>
                        <input type="text" class="form-control" id="producer" required>
                    </div>
                    <div class="col-md-6">
                        <label for="distributor" class="form-label">Distribuidor</label>
                        <input type="text" class="form-control" id="distributor" required>
                    </div>
                    <div class="col-md-6">
                        <label for="genre" class="form-label">Género</label>
                        <input type="text" class="form-control" id="genre" required>
                    </div>
                    <div class="col-md-12">
                        <label for="photo" class="form-label">URL del póster</label>
                        <input type="url" class="form-control" id="photo">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Añadir Película</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Sección Profesionales -->
        <section id="professionals" class="section">
            <h2 class="mb-4">Profesionales</h2>
            <div id="professionals-container" class="row">
                <!-- Los profesionales se cargarán aquí dinámicamente -->
            </div>
        </section>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="movie.js"></script>
    <script src="deep.js"></script>
</body>
</html>
